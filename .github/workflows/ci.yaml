name: CI

on:
  pull_request:
  push:
    branches:
      - master

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPOSITORY: weather
  IMAGE_NAME: weather-app
  IMAGE_TAG: ${{ github.sha }}
  IMAGE_URI: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/weather/weather-app


jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/weather

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt pytest

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Run unit tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t weather-app:${{ github.sha }} .

      - name: Auth to GCP
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY}}
      
      - name: Set up gcloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker auth
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet 
      
      - name: Tag image for Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_URI}:${IMAGE_TAG}
          docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_URI}:stable
                                                                                                                        
      - name: Push images
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          docker push ${IMAGE_URI}:${IMAGE_TAG}
          docker push ${IMAGE_URI}:stable
