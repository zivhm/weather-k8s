apiVersion: v1                                                                                                                               
kind: ConfigMap                                                                                                                              
metadata:                                                                                                                                    
  name: weather-config                                                                                                                       
  namespace: weather                                                                                                                         
data:                                                                                                                                        
  DEFAULT_CITY: "Tel Aviv"                                                                                                                   
  GEOCODING_API_URL: "https://geocoding-api.open-meteo.com/v1/search"                                                                        
  WEATHER_API_URL: "https://api.open-meteo.com/v1/forecast"                                                                                  
  WEATHER_HTTP_TIMEOUT_SECONDS: "12"
  CAMERA_HTTP_TIMEOUT_SECONDS: "6"
  WEBCAM_SEARCH_RADIUS_KM: "30"
  PORT: "8080"
  LOG_LEVEL: "INFO"
