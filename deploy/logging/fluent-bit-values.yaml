config:                                                                                                 
  service: |                                                                                            
    [SERVICE]                                                                                           
        Daemon Off                                                                                      
        Flush 1                                                                                         
        Log_Level info                                                                                  
        Parsers_File parsers.conf                                                                       
        HTTP_Server On                                                                                  
        HTTP_Listen 0.0.0.0                                                                             
        HTTP_Port 2020                                                                                  
  inputs: |                                                                                             
    [INPUT]                                                                                             
        Name tail                                                                                       
        Path /var/log/containers/*.log                                                                  
        Parser cri                                                                                      
        Tag kube.*                                                                                      
        Mem_Buf_Limit 10MB                                                                              
        Skip_Long_Lines On                                                                              
  filters: |                                                                                            
    [FILTER]                                                                                            
        Name kubernetes                                                                                 
        Match kube.*                                                                                    
        Merge_Log On                                                                                    
        Keep_Log Off                                                                                    
        K8S-Logging.Parser On                                                                           
        K8S-Logging.Exclude Off                                                                         
  outputs: |                                                                                            
    [OUTPUT]                                                                                            
        Name es                                                                                         
        Match kube.*                                                                                    
        Host weather-logs-master.logging.svc.cluster.local                                              
        Port 9200                                                                                       
        Logstash_Format On                                                                              
        Logstash_Prefix weather                                                                         
        Replace_Dots On                                                                                 
        Suppress_Type_Name On                                                                           
        Retry_Limit False                  