clusterName: weather-logs
nodeGroup: master
replicas: 1
minimumMasterNodes: 1

esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false

esJavaOpts: "-Xms512m -Xmx512m"

resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "500m"
    memory: "1Gi"

volumeClaimTemplate:
  accessModes: [ "ReadWriteOnce" ]
  resources:
    requests:
      storage: 10Gi